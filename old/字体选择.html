<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>IP 字体颜色选择</title>
<style>
body { background:#0a0f1e; color:#e2eaf8; font-family:'Segoe UI',sans-serif; padding:28px; }
h3 { color:#60a5fa; margin-bottom:4px; font-size:1rem; }
p  { color:#475569; font-size:.78rem; margin-bottom:20px; }
.row { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:28px; }
.sample {
    background:rgba(14,26,58,.55); border:1px solid rgba(80,140,255,.18);
    border-radius:10px; padding:12px 16px; cursor:pointer;
    transition: border-color .15s, box-shadow .15s; min-width:300px;
}
.sample:hover { border-color:rgba(99,102,241,.5); box-shadow:0 0 0 2px rgba(99,102,241,.2); }
.sample.sel    { border-color:#6366f1; box-shadow:0 0 0 3px rgba(99,102,241,.3); }
.label { font-size:.68rem; color:#334155; margin-bottom:6px; }
.ip    { display:flex; align-items:center; gap:5px; }
.v6b { font-size:.62rem; padding:1px 4px; border-radius:3px; background:rgba(99,102,241,.15); color:#818cf8; vertical-align:middle; }
.v4b { font-size:.62rem; padding:1px 4px; border-radius:3px; background:rgba(16,185,129,.1); color:#34d399; vertical-align:middle; }
.result { margin-top:24px; padding:14px 18px; background:rgba(99,102,241,.1); border:1px solid rgba(99,102,241,.3); border-radius:8px; font-size:.82rem; }
.result span { color:#6ee7b7; font-weight:600; }
</style>
</head>
<body>

<h3>IPv6 地址字体 — 点击选择你喜欢的</h3>
<p>以下展示同一个 IPv6 地址，各种字体/颜色/粗细组合，点击选中</p>

<div class="row" id="samples"></div>

<div class="result" id="result">👆 点击上方样本选择</div>

<script>
const IPv6 = '2a03:94e0:ffff:185:243:218:0:213';
const IPv4 = '192.168.100.50';

const options = [
  { id:'A', label:'细体 · 标准蓝灰（当前接近）', font:"font-family:monospace;font-size:.84rem;font-weight:400;color:#94a3b8;" },
  { id:'B', label:'细体 · 冰蓝色', font:"font-family:monospace;font-size:.84rem;font-weight:400;color:#7dd3fc;" },
  { id:'C', label:'细体 · 柔白（可读性最高）', font:"font-family:monospace;font-size:.84rem;font-weight:400;color:#e2eaf8;" },
  { id:'D', label:'细体 · 薄雾蓝', font:"font-family:monospace;font-size:.84rem;font-weight:400;color:#bfdbfe;" },
  { id:'E', label:'细体 · 暗灰蓝（低调）', font:"font-family:monospace;font-size:.84rem;font-weight:400;color:#64748b;" },
  { id:'F', label:'半粗 · 冰蓝', font:"font-family:monospace;font-size:.84rem;font-weight:500;color:#7dd3fc;" },
  { id:'G', label:'半粗 · 柔白', font:"font-family:monospace;font-size:.84rem;font-weight:500;color:#e2eaf8;" },
  { id:'H', label:'Courier New · 冰蓝', font:"font-family:'Courier New',monospace;font-size:.83rem;font-weight:400;color:#7dd3fc;" },
  { id:'I', label:'Courier New · 柔白', font:"font-family:'Courier New',monospace;font-size:.83rem;font-weight:400;color:#e2eaf8;" },
  { id:'J', label:'Consolas · 薄雾蓝', font:"font-family:'Consolas','Courier New',monospace;font-size:.83rem;font-weight:400;color:#bfdbfe;" },
  { id:'K', label:'Consolas · 冰蓝', font:"font-family:'Consolas','Courier New',monospace;font-size:.83rem;font-weight:400;color:#7dd3fc;" },
  { id:'L', label:'细体 · IPv6蓝紫 / IPv4绿（按版本着色）', font:"font-family:monospace;font-size:.84rem;font-weight:400;", v6color:'#a5b4fc', v4color:'#6ee7b7' },
  { id:'M', label:'Consolas · IPv6蓝紫 / IPv4绿', font:"font-family:'Consolas','Courier New',monospace;font-size:.83rem;font-weight:400;", v6color:'#a5b4fc', v4color:'#6ee7b7' },
  { id:'N', label:'细体 · 银白（极简）', font:"font-family:monospace;font-size:.84rem;font-weight:400;color:#cbd5e1;" },
  { id:'O', label:'SFMono · 冰蓝（macOS等宽）', font:"font-family:'SF Mono','Consolas',monospace;font-size:.82rem;font-weight:400;color:#7dd3fc;" },
];

const cont = document.getElementById('samples');
let sel = null;
options.forEach(o => {
    const d = document.createElement('div');
    d.className = 'sample';
    d.innerHTML = `<div class="label">${o.id}. ${o.label}</div>
    <div class="ip">
        <span style="${o.font}${o.v6color?'color:'+o.v6color:''}">${IPv6}</span>
        <span class="v6b">v6</span>
    </div>
    <div class="ip" style="margin-top:5px;">
        <span style="${o.font}${o.v4color?'color:'+o.v4color:''}">${IPv4}</span>
        <span class="v4b">v4</span>
    </div>`;
    d.onclick = () => {
        document.querySelectorAll('.sample').forEach(s=>s.classList.remove('sel'));
        d.classList.add('sel');
        sel = o;
        document.getElementById('result').innerHTML =
            `✅ 你选择了 <span>${o.id}</span>：${o.label}<br>
            <span style="font-size:.75rem;color:#475569;">告诉 Claude 选了哪个字母即可</span>`;
    };
    cont.appendChild(d);
});
</script>
</body>
</html>
